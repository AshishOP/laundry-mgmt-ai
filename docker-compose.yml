version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: grid07-postgres
    environment:
      POSTGRES_DB: coreapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: grid07-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
